# Build configuration for OpticC
# Points llvm-sys (used transitively by inkwell) at the system LLVM 18 installation.
# The project declares inkwell with the "llvm18-1-prefer-dynamic" feature, so
# LLVM_SYS_181_PREFIX must be set to the root of an LLVM-18 installation.
# On this host LLVM 18 dev libraries live at /usr/lib/llvm-18.

[env]
LLVM_SYS_181_PREFIX = "/usr/lib/llvm-18"
