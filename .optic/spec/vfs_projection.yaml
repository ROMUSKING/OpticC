api_version: "1.0"

structs:
  - name: Vfs
    description: Userspace virtual filesystem implementing FUSE to expose reconstructed source files from the arena with error injection
    fields:
      - name: arena
        type: Arc<Arena>
        description: Memory-mapped arena containing AST nodes
      - name: analysis
        type: Arc<AliasAnalysis>
        description: Analysis engine for vulnerability detection
      - name: mount_path
        type: String
        description: Path where the VFS is mounted
      - name: file_nodes
        type: HashMap<u64, VfsNode>
        description: In-memory filesystem tree
      - name: next_inode
        type: u64
        description: Next available inode number

  - name: VfsNode
    description: Internal node representing a file or directory in the VFS
    fields:
      - name: name
        type: String
        description: File or directory name
      - name: inode
        type: u64
        description: Unique inode identifier
      - name: file_type
        type: FileType
        description: Directory or regular file
      - name: content
        type: Option<Vec<u8>>
        description: File content (None for directories)
      - name: children
        type: Vec<u64>
        description: Child inode list for directories
      - name: parent
        type: u64
        description: Parent inode

  - name: Vulnerability
    description: Represents a detected vulnerability in source code
    fields:
      - name: line
        type: u32
        description: Line number of the vulnerability
      - name: kind
        type: VulnerabilityKind
        description: Type of vulnerability
      - name: message
        type: String
        description: Human-readable description

  - name: VulnerabilityKind
    description: Enumeration of vulnerability types
    variants:
      - BufferOverflow
      - UseAfterFree
      - DoubleFree
      - NullDereference
      - IntegerOverflow
      - CommandInjection

functions:
  - name: Vfs::new
    description: Create a new VFS instance
    inputs:
      - name: arena
        type: Arc<Arena>
      - name: analysis
        type: Arc<AliasAnalysis>
      - name: mount_path
        type: &str
    returns: Self

  - name: Vfs::mount_path
    description: Get the mount path
    inputs:
      - name: self
        type: &Self
    returns: &str

  - name: Vfs::reconstruct_from_arena
    description: Reconstruct the virtual filesystem tree from arena nodes
    inputs:
      - name: self
        type: &mut Self
    returns: ()

  - name: Vfs::read_file
    description: Read a file with error injection, returns content with // [OPTIC ERROR] comments
    inputs:
      - name: self
        type: &Self
      - name: path
        type: &str
    returns: Option<Vec<u8>>

  - name: Vfs::inject_error_comments
    description: Inject OPTIC ERROR comments above vulnerable lines
    inputs:
      - name: self
        type: &Self
      - name: file_inode
        type: u64
      - name: content
        type: Vec<u8>
    returns: Vec<u8>

  - name: AliasAnalysis::new
    description: Create a new analysis engine
    inputs: []
    returns: Self

  - name: AliasAnalysis::is_vulnerable
    description: Check if a line contains potentially vulnerable code
    inputs:
      - name: self
        type: &Self
      - name: line
        type: &str
    returns: bool

  - name: AliasAnalysis::has_vulnerabilities
    description: Check if any vulnerabilities have been recorded
    inputs:
      - name: self
        type: &Self
    returns: bool

mount_behavior:
  description: "The VFS mounts at a configurable path and exposes .optic/vfs/src/ containing reconstructed C source files. When files are read via the FUSE read() syscall, the VFS queries the AliasAnalysis engine and injects // [OPTIC ERROR] shadow comments above lines matching vulnerability patterns."

error_injection:
  description: "Lines matching dangerous patterns (strcpy, sprintf, gets, malloc, etc.) receive // [OPTIC ERROR] prefix comments to alert developers of potential security issues."
  example: |
    // [OPTIC ERROR] sprintf(buf, user_input);  // potential buffer overflow
    sprintf(buf, user_input);

file_reconstruction:
  description: "Files are reconstructed from AST nodes in the mmap arena by traversing the node tree and emitting C source code based on node kind and properties."