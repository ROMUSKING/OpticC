api_version: "1.0"
squad: "infra"
domain: "Header Deduplication"

structs:
  - name: DB
    semantic_description: "Embedded key-value store using redb for header file deduplication and macro definition caching."
    fields:
      - name: db
        type: Database
        description: "Internal redb database handle."

functions:
  - name: DB::new
    semantic_description: "Opens or creates a new redb database at the specified path, initializing both the includes and symbols tables."
    parameters:
      - name: path
        type: "&str"
        description: "File path for the database."
    returns:
      type: "Result<Self, redb::Error>"
      description: "A new DB instance or an error if initialization failed."
    side_effects: "Creates the database file if it does not exist and initializes table schemas."

  - name: DB::get_file_hash
    semantic_description: "Retrieves the cached AST offset for a previously seen file hash, enabling #include deduplication."
    parameters:
      - name: key
        type: "&[u8; 32]"
        description: "SHA-256 hash of the file path for deduplication."
    returns:
      type: "Result<Option<u32>, redb::Error>"
      description: "The AST offset if the file has been seen before, or None."
    llm_usage_examples:
      - title: "Checking if a header was already processed"
        code: |
          let db = DB::new("cache.db").unwrap();
          let hash = sha256(b"/usr/include/stdio.h");
          if let Some(offset) = db.get_file_hash(&hash).unwrap() {
              // Reuse AST at offset
          }

  - name: DB::insert_file_hash
    semantic_description: "Records a file hash with its corresponding AST offset for future deduplication."
    parameters:
      - name: key
        type: "&[u8; 32]"
        description: "SHA-256 hash of the file path."
      - name: offset
        type: "u32"
        description: "AST node offset where this file's AST begins."
    returns:
      type: "Result<(), redb::Error>"
      description: "Ok on success."
    side_effects: "Persists to disk on commit."

  - name: DB::get_macro_def
    semantic_description: "Retrieves the cached expansion for a macro definition, avoiding redundant re-parsing."
    parameters:
      - name: key
        type: "&str"
        description: "The macro name (e.g., 'MAX_PATH')"
    returns:
      type: "Result<Option<String>, redb::Error>"
      description: "The macro expansion string if found, or None."
    llm_usage_examples:
      - title: "Looking up a cached macro"
        code: |
          if let Some(expansion) = db.get_macro_def("MAX_PATH").unwrap() {
              // Use cached expansion
          }

  - name: DB::insert_macro_def
    semantic_description: "Stores a macro name with its expanded definition for future lookups."
    parameters:
      - name: key
        type: "&str"
        description: "The macro name."
      - name: value
        type: "&str"
        description: "The expanded definition."
    returns:
      type: "Result<(), redb::Error>"
      description: "Ok on success."
    side_effects: "Persists to disk on commit."
