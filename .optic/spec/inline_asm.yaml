api_version: "1.0"
squad: "inline_asm"
domain: "Inline Assembly Parsing and LLVM Lowering"
status: "IMPLEMENTED"

semantic_description: >
  Inline assembly support for parsing and lowering GCC-style asm blocks to LLVM IR.
  Handles basic asm (no operands), extended asm (output/input/clobber operands),
  goto asm, and asm templates with %0, %1, %[name] placeholders. The parser
  recognizes asm and __asm__ keywords with their colon-separated operand syntax.
  The LLVM backend lowers inline asm using inkwell's InlineAsm API.

memory_layout: |
  Inline Asm Node (AST):
    kind = 207 (AST_ASM_STMT)
    data = flags (volatile: bit 0, goto: bit 1)
    first_child = template string offset
    next_sibling chain = operand nodes

  Operand Node:
    kind = 208 (ASM_OPERAND_OUTPUT) / 209 (ASM_OPERAND_INPUT) / 210 (ASM_CLOBBER) / 211 (ASM_GOTO_LABEL)
    data = constraint/clobber/label string offset
    first_child = expression node (for output/input)

  LLVM Inline Asm:
    - Template: opaque string passed to LLVM
    - Constraints: GCC-style constraint string (e.g., "=r,r,~{memory}")
    - Side effects: volatile flag, memory clobber

side_effects:
  - "Inline asm nodes are created during parsing"
  - "Template strings are stored in the arena's string pool"
  - "LLVM backend creates InlineAsm values with matching constraints"
  - "Memory clobbers imply side effects — marked as volatile in LLVM"

llm_usage_examples:
  - name: "Parse basic asm"
    description: "asm volatile(\"nop\");"
    code: |
      // AST: AST_ASM_STMT { template: "nop", volatile: true }
      // LLVM: call void asm sideeffect "nop"()

  - name: "Parse extended asm"
    description: "asm volatile(\"addl %1, %0\" : \"+r\"(x) : \"r\"(y));"
    code: |
      // AST: AST_ASM_STMT {
      //   template: "addl %1, %0",
      //   volatile: true,
      //   outputs: [ASM_OPERAND_OUTPUT { constraint: "r", expr: x }],
      //   inputs: [ASM_OPERAND_INPUT { constraint: "r", expr: y }],
      // }
      // LLVM: call void asm sideeffect "addl $1, $0", "=r,r"(i32 %x, i32 %y)

api_reference:
  types:
    InlineAsm:
      description: "Inline assembly AST node"
      fields:
        - "template: String (asm template string)"
        - "volatile: bool"
        - "outputs: Vec<AsmOperand>"
        - "inputs: Vec<AsmOperand>"
        - "clobbers: Vec<String>"
        - "goto_labels: Vec<String>"

    AsmOperand:
      description: "Inline asm operand"
      fields:
        - "constraint: String"
        - "expression: NodeOffset"
        - "is_output: bool"
        - "is_readwrite: bool"

    AsmLowering:
      description: "LLVM inline asm generation"
      methods:
        - "lower_asm_stmt(&mut self, arena: &Arena, node: &CAstNode) -> Result<Option<BasicValueEnum>, BackendError>"
        - "build_constraints_string(outputs, inputs, clobbers) -> String"

node_kinds:
  AST_ASM_STMT: 207
  ASM_OPERAND_OUTPUT: 208
  ASM_OPERAND_INPUT: 209
  ASM_CLOBBER: 210
  ASM_GOTO_LABEL: 211

implementation_notes:
  - "Parser recognizes asm, __asm__, __asm keywords"
  - "Volatile keyword accepted after asm keyword"
  - "Colon-separated operand sections: outputs, inputs, clobbers, goto labels"
  - "Read-write operands detected via '+' constraint prefix"
  - "Output operands strip '=' prefix for LLVM constraint string"
  - "LLVM lowering uses context.create_inline_asm() with ATT dialect"
  - "Memory clobber automatically sets side_effects flag"
  - "23 tests covering all major use cases"
