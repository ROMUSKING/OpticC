api_version: "1.0"
squad: "inline_asm"
domain: "Inline Assembly Parsing and LLVM Lowering"

semantic_description: >
  Inline assembly support for parsing and lowering GCC-style asm blocks to LLVM IR.
  Handles basic asm (no operands), extended asm (output/input/clobber operands),
  goto asm, and asm templates with %0, %1, %[name] placeholders. The parser
  recognizes asm and __asm__ keywords with their colon-separated operand syntax.
  The LLVM backend lowers inline asm using inkwell's InlineAsm API.

memory_layout: |
  Inline Asm Node (AST):
    kind = 210 (AST_INLINE_ASM)
    data = flags (volatile: bit 0, goto: bit 1)
    first_child = template string node
    next_sibling chain = operand nodes

  Operand Node:
    kind = 211 (ASM_OUTPUT) / 212 (ASM_INPUT) / 213 (ASM_CLOBBER)
    data = constraint string offset
    first_child = expression node (for output/input)

  LLVM Inline Asm:
    - Template: opaque string passed to LLVM
    - Constraints: GCC-style constraint string (e.g., "=r,r,~{memory}")
    - Side effects: volatile flag, memory clobber

side_effects:
  - "Inline asm nodes are created during parsing"
  - "Template strings are stored in the arena's string pool"
  - "LLVM backend creates InlineAsm values with matching constraints"
  - "Memory clobbers imply side effects — marked as volatile in LLVM"

llm_usage_examples:
  - name: "Parse basic asm"
    description: "asm volatile(\"nop\");"
    code: |
      // AST: AST_INLINE_ASM { template: "nop", volatile: true }
      // LLVM: call void asm sideeffect "nop"()

  - name: "Parse extended asm"
    description: "asm volatile(\"addl %1, %0\" : \"+r\"(x) : \"r\"(y));"
    code: |
      // AST: AST_INLINE_ASM {
      //   template: "addl %1, %0",
      //   volatile: true,
      //   outputs: [ASM_OUTPUT { constraint: "+r", expr: x }],
      //   inputs: [ASM_INPUT { constraint: "r", expr: y }],
      // }
      // LLVM: call void asm sideeffect "addl $1, $0", "=r,r"(i32 %x, i32 %y)

api_reference:
  types:
    InlineAsm:
      description: "Inline assembly AST node"
      fields:
        - "template: String (asm template string)"
        - "volatile: bool"
        - "outputs: Vec<AsmOperand>"
        - "inputs: Vec<AsmOperand>"
        - "clobbers: Vec<String>"
        - "goto_labels: Vec<String>"

    AsmOperand:
      description: "Inline asm operand"
      fields:
        - "constraint: String"
        - "expression: NodeOffset"
        - "is_output: bool"
        - "is_readwrite: bool"

    AsmLowering:
      description: "LLVM inline asm generation"
      methods:
        - "lower_asm(&mut self, arena: &Arena, node: &CAstNode) -> Result<(), BackendError>"
        - "build_constraints(&self, outputs: &[AsmOperand], inputs: &[AsmOperand], clobbers: &[String]) -> String"
        - "build_function_type(&self, outputs: &[AsmOperand], inputs: &[AsmOperand]) -> FunctionType"
