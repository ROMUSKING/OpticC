api_version: "1.0"

overview: >
  The Analysis module provides graph-based static analysis for memory safety,
  pointer provenance tracking, and Use-After-Free vulnerability detection.

core_data_structures:
  AffineGrade:
    description: "Represents memory ownership properties for pointer analysis"
    variants:
      - name: Owned
        description: "Exclusive ownership - pointer can be promoted to noalias"
      - name: Shared
        description: "Shared access - cannot be noalias"
      - name: Borrowed
        description: "Non-owning reference - does not affect provenance"

  PointerProvenance:
    description: "Tracks the origin of pointers through the program"
    fields:
      - name: source
        type: NodeOffset
        description: "Where the pointer was created"
      - name: provenance
        type: "Vec<u32>"
        description: "List of source nodes in its history"
      - name: is_noalias
        type: bool
        description: "Whether pointer has exclusive provenance"

  TaintState:
    description: "Represents taint status for UAF detection"
    variants:
      - name: Untainted
        description: "Safe, initialized memory"
      - name: Tainted
        description: "Potentially freed memory"
        fields:
          - name: source
            type: NodeOffset
            description: "Deallocation site"
      - name: Escaped
        description: "Memory that escaped to unknown code"

  DiagnosticSeverity:
    description: "Analysis diagnostic levels"
    variants:
      - name: Note
        description: "Informational"
      - name: Warning
        description: "Potential issue"
      - name: Error
        description: "Definite bug (e.g., confirmed UAF)"

analysis_components:
  PointerProvenanceAnalyzer:
    description: "Uses DFS to trace pointer origins"
    algorithm:
      - "Start at pointer node"
      - "Recursively follow assignment sources (AST_ASSIGN, AST_VAR_DECL)"
      - "Through address-of operations (OP_ADDR)"
      - "Track allocation sites to determine exclusivity"

  AffineTypeAnalyzer:
    description: "Applies affine type system for noalias hints"
    function: >
      Analyzes pointer flow through AST, marks pointers as Owned if provenance
      is strictly disjoint, enables restrict keyword optimization hints

  TaintTracker:
    description: "Detects Use-After-Free vulnerabilities"
    algorithm:
      - "Track memory deallocation sites (AST_RETURN, free calls)"
      - "Mark memory as Tainted after free"
      - "Report UAF if tainted memory is dereferenced"

  MemorySafetyDiagnostics:
    description: "Collects and reports analysis findings"
    types:
      - PointerDiagnostic
      - UafDiagnostic

diagnostic_types:
  PointerDiagnostic:
    description: "Provenance conflicts, noalias violations"
    fields:
      - severity: DiagnosticSeverity
      - node: NodeOffset
      - message: String
      - provenance_trace: Vec<NodeOffset>

  UafDiagnostic:
    description: "Use-After-Free detection with source locations"
    fields:
      - freed_node: NodeOffset
      - deref_node: NodeOffset
      - path: Vec<NodeOffset>

ast_node_categories:
  pointer_related_kinds:
    - name: AST_PTR
      value: 7
      description: "Pointer type specifier"
    - name: AST_UNOP
      value: 65
      description: "Includes OP_ADDR (4) and OP_DEREF (5)"
    - name: AST_ASSIGN
      value: 73
      description: "Assignment - provenance transfer point"
    - name: AST_VAR_DECL
      value: 21
      description: "Variable declaration - allocation site"

  memory_management_kinds:
    - name: AST_CALL
      value: 67
      description: "Function calls (potential free/malloc)"
    - name: AST_RETURN
      value: 44
      description: "Return statements (potential deallocation)"

  reference_tracking_kinds:
    - name: AST_IDENT
      value: 60
      description: "Identifier references"
    - name: AST_MEMBER
      value: 69
      description: "Member access"

api:
  AliasAnalyzer:
    description: "Main analyzer struct"
    lifetime: "'a"
    fields:
      - name: arena
        type: "&'a Arena"
      - name: provenance_cache
        type: "HashMap<NodeOffset, PointerProvenance>"
      - name: taint_state
        type: "HashMap<NodeOffset, TaintState>"
      - name: diagnostics
        type: "Vec<Diagnostic>"

    methods:
      - name: new
        signature: "pub fn new(arena: &'a Arena) -> Self"
        description: "Creates a new analyzer"

      - name: trace_provenance
        signature: "pub fn trace_provenance(&self, node: NodeOffset, visited: &mut HashSet<u32>) -> PointerProvenance"
        description: "DFS provenance tracing"

      - name: is_noalias
        signature: "pub fn is_noalias(&self, ptr_a: NodeOffset, ptr_b: NodeOffset) -> bool"
        description: "Check if two pointers are strictly disjoint"

      - name: get_affine_grade
        signature: "pub fn get_affine_grade(&self, ptr: NodeOffset) -> AffineGrade"
        description: "Get ownership grade for pointer"

      - name: check_taint
        signature: "pub fn check_taint(&self, node: NodeOffset) -> TaintState"
        description: "Check taint status"

      - name: mark_freed
        signature: "pub fn mark_freed(&mut self, node: NodeOffset)"
        description: "Mark memory as freed (tainted)"

      - name: detect_uaf
        signature: "pub fn detect_uaf(&self, deref: NodeOffset) -> Option<UafDiagnostic>"
        description: "Detect use-after-free at dereference"

      - name: get_diagnostics
        signature: "pub fn get_diagnostics(&self) -> &[Diagnostic]"
        description: "Get all collected diagnostics"

      - name: emit_diagnostic
        signature: "pub fn emit_diagnostic(&mut self, severity: DiagnosticSeverity, node: NodeOffset, msg: &str)"
        description: "Add a diagnostic"

usage_pattern:
  - "Create analyzer: AliasAnalyzer::new(&arena)"
  - "Run analysis: provenance analysis + taint tracking"
  - "Query results: is_noalias(), check_taint(), get_diagnostics()"
  - "Emit findings for compiler or linter"
