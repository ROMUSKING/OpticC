api_version: "1.0"

structs:
  - name: LlvmBackend
    description: "LLVM IR code generator using inkwell. Lowers AST nodes from the memory-mapped arena into LLVM IR, applying vectorization hints from analysis."
    fields:
      - name: context
        type: "&Context"
        description: "Inkwell context for LLVM IR construction"
      - name: module
        type: "Module"
        description: "LLVM module containing generated IR"
      - name: builder
        type: "Builder"
        description: "LLVM builder for instruction emission"
      - name: strings
        type: "HashMap<NodeOffset, PointerValue>"
        description: "Cache of global string constants"
      - name: variables
        type: "HashMap<NodeOffset, PointerValue>"
        description: "Cache of local/alloca'd variables"
      - name: functions
        type: "HashMap<NodeOffset, FunctionValue>"
        description: "Cache of generated functions"
      - name: vectorization_hints
        type: "VectorizationHints"
        description: "Vectorization configuration from analysis"

  - name: VectorizationHints
    description: "Hints from alias analysis for vectorization optimization"
    fields:
      - name: loop_vectorize
        type: "bool"
        description: "Enable loop vectorization"
      - name: vector_width
        type: "u32"
        description: "Target vector width in elements"
      - name: alignment_hints
        type: "HashMap<NodeOffset, u32>"
        description: "Memory alignment hints per node offset"

  - name: BackendError
    description: "Errors that can occur during LLVM lowering"
    variants:
      - name: UnknownNodeKind
        fields:
          - name: kind
            type: "u16"
        description: "Encountered an AST node with unknown kind code"
      - name: InvalidNode
        description: "AST node is malformed or incomplete"
      - name: UndefinedVariable
        fields:
          - name: offset
            type: "NodeOffset"
        description: "Referenced variable not found in symbol table"
      - name: UndefinedFunction
        fields:
          - name: offset
            type: "NodeOffset"
        description: "Referenced function not found in symbol table"
      - name: InvalidOperator
        fields:
          - name: code
            type: "u32"
        description: "Invalid operator code in AST node data field"
      - name: VerificationFailed
        fields:
          - name: message
            type: "String"
        description: "LLVM module verification failed"
      - name: IoError
        fields:
          - name: message
            type: "String"
        description: "I/O error during code generation"

functions:
  - name: LlvmBackend::new
    inputs:
      - name: context
        type: "&Context"
      - name: module_name
        type: "&str"
    returns: "Self"
    description: "Creates a new LLVM backend with the given context and module name"

  - name: LlvmBackend::set_vectorization_hints
    inputs:
      - name: self
        type: "&mut Self"
      - name: hints
        type: "VectorizationHints"
    returns: "()"
    description: "Sets vectorization hints from alias analysis"

  - name: LlvmBackend::compile
    inputs:
      - name: self
        type: "&mut Self"
      - name: arena
        type: "&Arena"
      - name: root
        type: "NodeOffset"
    returns: "Result<(), BackendError>"
    description: "Compiles the AST rooted at 'root' in the given arena to LLVM IR"

  - name: LlvmBackend::module
    inputs:
      - name: self
        type: "&Self"
    returns: "&Module"
    description: "Returns the LLVM module being built"

  - name: LlvmBackend::dump_ir
    inputs:
      - name: self
        type: "&Self"
    returns: "String"
    description: "Returns the LLVM IR as a string for debugging"

  - name: LlvmBackend::verify
    inputs:
      - name: self
        type: "&Self"
    returns: "Result<(), BackendError>"
    description: "Verifies the generated LLVM module"

  - name: LlvmBackend::optimize
    inputs:
      - name: self
        type: "&Self"
      - name: opt_level
        type: "u32"
    returns: "Result<(), BackendError>"
    description: "Runs LLVM optimization passes at the specified level (0-3)"

  - name: LlvmBackend::lower_type
    inputs:
      - name: self
        type: "&Self"
      - name: arena
        type: "&Arena"
      - name: node
        type: "&CAstNode"
    returns: "Result<Option<BasicTypeEnum>, BackendError>"
    description: "Lowers type nodes (AST_VOID, AST_INT, AST_CHAR, AST_PTR, etc.) to LLVM types"

  - name: LlvmBackend::lower_binop
    inputs:
      - name: self
        type: "&mut Self"
      - name: arena
        type: "&Arena"
      - name: node
        type: "&CAstNode"
    returns: "Result<Option<BasicValueEnum>, BackendError>"
    description: "Lowers binary operations (OP_ADD, OP_SUB, etc.) to LLVM IR"

  - name: LlvmBackend::lower_unop
    inputs:
      - name: self
        type: "&mut Self"
      - name: arena
        type: "&Arena"
      - name: node
        type: "&CAstNode"
    returns: "Result<Option<BasicValueEnum>, BackendError>"
    description: "Lowers unary operations (OP_NEG, OP_NOT, etc.) to LLVM IR"

  - name: LlvmBackend::lower_call
    inputs:
      - name: self
        type: "&mut Self"
      - name: arena
        type: "&Arena"
      - name: node
        type: "&CAstNode"
    returns: "Result<Option<BasicValueEnum>, BackendError>"
    description: "Lowers function calls to LLVM IR"

  - name: create_backend
    inputs:
      - name: context
        type: "&Context"
      - name: module_name
        type: "&str"
    returns: "LlvmBackend"
    description: "Factory function to create a new LlvmBackend"

ast_node_kinds:
  description: "AST node kinds from parser.yaml that this backend handles"
  kinds:
    - Types: 1-9 (AST_VOID, AST_INT, AST_CHAR, AST_STRUCT, AST_UNION, AST_ENUM, AST_PTR, AST_ARRAY, AST_FUNC)
    - Declarations: 20-26 (AST_DECL, AST_VAR_DECL, AST_FUNC_DECL, AST_FUNC_DEF, AST_PARAM, AST_STRUCT_DECL, AST_ENUM_CONST)
    - Statements: 40-50 (AST_COMPOUND, AST_IF, AST_WHILE, AST_FOR, AST_RETURN, AST_EXPR_STMT, AST_BREAK, AST_CONTINUE, AST_EMPTY, AST_SWITCH)
    - Expressions: 60-73 (AST_IDENT, AST_INT_CONST, AST_CHAR_CONST, AST_STRING, AST_BINOP, AST_UNOP, AST_COND, AST_CALL, AST_ARRAY_SUBSCRIPT, AST_MEMBER, AST_CAST, AST_SIZEOF, AST_COMMA, AST_ASSIGN)
    - Literals: 80-83 (AST_NUM, AST_STRING_LIT, AST_FLOAT_CONST, AST_FLOAT)

binary_operators:
  description: "Binary operator codes mapped to LLVM operations"
  mapping:
    1: "add"      # OP_ADD
    2: "sub"      # OP_SUB
    3: "mul"      # OP_MUL
    4: "div"      # OP_DIV
    5: "rem"      # OP_MOD
    6: "icmp eq"  # OP_EQ
    7: "icmp ne"  # OP_NE
    8: "icmp slt" # OP_LT
    9: "icmp sgt" # OP_GT
    10: "icmp sle" # OP_LE
    11: "icmp sge" # OP_GE
    12: "and"      # OP_AND
    13: "or"       # OP_OR
    14: "and"      # OP_BITAND
    15: "or"       # OP_BITOR
    16: "xor"      # OP_XOR
    17: "shl"      # OP_SHL
    18: "ashr"     # OP_SHR
    19: "store"    # OP_ASSIGN

unary_operators:
  description: "Unary operator codes mapped to LLVM operations"
  mapping:
    1: "neg"      # OP_NEG
    2: "not"      # OP_NOT
    3: "not"      # OP_BITNOT
    5: "load"     # OP_DEREF

vectorization:
  description: "Vectorization hints applied during lowering"
  hints:
    - name: loop_vectorize
      description: "When true, apply loop vectorization transforms"
    - name: vector_width
      description: "Target width for SIMD vector operations (e.g., 4 for float32x4)"
    - name: alignment_hints
      description: "Alignment requirements for memory operations"
