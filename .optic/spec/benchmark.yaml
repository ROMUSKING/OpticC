api_version: "1.0"
squad: "benchmark"
domain: "Compiler Benchmarking and Performance Comparison"

semantic_description: >
  The Benchmark suite compares OpticC against GCC and Clang across multiple dimensions:
  compile time, output size, execution time, memory usage, and correctness. It supports
  micro-benchmarks, coreutils subset, and synthetic stress tests. Results are stored as
  JSON and reports generated in Markdown.

memory_layout: |
  Benchmark Result:
    - name: String (benchmark name)
    - compiler: String (gcc, clang)
    - version: String
    - optimization: String (O0, O1, O2, O3)
    - metrics: BenchmarkMetrics

  BenchmarkMetrics:
    - compile_time_ms: u64
    - output_size_bytes: u64
    - peak_memory_kb: u64
    - correctness: String (pass, fail, error)
    - test_total: u64
    - test_passed: u64
    - test_failed: u64

side_effects:
  - "BenchmarkRunner::run() compiles test files with available compilers"
  - "Each benchmark is run N times (configurable, default 5) for statistical significance"
  - "Results are stored as JSON in the configured results directory"
  - "Markdown reports are generated via generate_markdown_report()"
  - "Compiled programs are executed for correctness checking"

llm_usage_examples:
  - name: "Run micro benchmarks"
    description: "Run micro-benchmarks with available compilers"
    code: |
      use optic_c::benchmark::{BenchmarkRunner, BenchmarkSuite};

      let runner = BenchmarkRunner::new()
          .with_results_dir("benchmarks/results".into())
          .with_runs_per_benchmark(5);

      let results = runner.run()?;
      let report = optic_c::benchmark::generate_markdown_report(&results);

  - name: "Generate comparison report"
    description: "Compare results across compilers"
    code: |
      use optic_c::benchmark::{generate_json_report, calculate_averages};

      let averages = calculate_averages(&results);
      let json = generate_json_report(&averages)?;

api_reference:
  types:
    BenchmarkResult:
      description: "Single benchmark result with metrics"
      fields:
        - "name: String"
        - "compiler: String"
        - "version: String"
        - "optimization: String"
        - "metrics: BenchmarkMetrics"

    BenchmarkMetrics:
      description: "Performance metrics for a benchmark run"
      fields:
        - "compile_time_ms: u64"
        - "output_size_bytes: u64"
        - "peak_memory_kb: u64"
        - "correctness: String"
        - "test_total: u64"
        - "test_passed: u64"
        - "test_failed: u64"

    BenchmarkSuite:
      description: "Benchmark test suites"
      variants:
        - "Micro"
        - "Coreutils"
        - "Synthetic"

    BenchmarkRunner:
      description: "Benchmark runner"
      fields:
        - "suites: Vec<BenchmarkSuite>"
        - "compilers: Vec<CompilerConfig>"
        - "optimization_levels: Vec<String>"
        - "results_dir: PathBuf"
        - "runs_per_benchmark: usize"
      methods:
        - "new() -> Self"
        - "add_suite(&mut self, suite: BenchmarkSuite)"
        - "add_compiler(&mut self, config: CompilerConfig)"
        - "run(&self) -> Result<Vec<BenchmarkResult>, BenchmarkError>"
        - "run_micro_benchmarks(&self) -> Result<Vec<BenchmarkResult>, BenchmarkError>"
        - "run_coreutils_benchmarks(&self) -> Result<Vec<BenchmarkResult>, BenchmarkError>"
        - "run_synthetic_benchmarks(&self) -> Result<Vec<BenchmarkResult>, BenchmarkError>"
        - "measure_compile_time(...) -> Result<u64, BenchmarkError>"
        - "measure_output_size(...) -> Result<u64, BenchmarkError>"
        - "measure_correctness(...) -> BenchmarkMetrics"
        - "generate_markdown_report(&self) -> Result<String, BenchmarkError>"
        - "generate_json_report(&self) -> Result<String, BenchmarkError>"

    CompilerConfig:
      description: "Compiler configuration"
      fields:
        - "name: String"
        - "command: String"
        - "compile_args: Vec<String>"
        - "link_args: Vec<String>"
      methods:
        - "new(name, command) -> Self"
        - "is_available(&self) -> bool"
        - "get_version(&self) -> String"

    BenchmarkError:
      description: "Error type for benchmark operations"
      variants:
        - "CompileError(String, String)"
        - "RuntimeError(String)"
        - "CorrectnessError(String, String, String)"
        - "IoError(std::io::Error)"
        - "CompilerNotAvailable(String)"

  functions:
    - "generate_markdown_report(results: &[BenchmarkResult]) -> String"
    - "generate_json_report(results: &[BenchmarkResult]) -> Result<String, serde_json::Error>"
    - "calculate_averages(results: &[BenchmarkResult]) -> Vec<BenchmarkResult>"
    - "generate_comparison_table(results: &[BenchmarkResult]) -> String"
