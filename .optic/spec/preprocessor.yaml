name: preprocessor
description: C Preprocessor module for Project OCF
module: src/frontend/preprocessor.rs

types:
  Token:
    fields:
      kind: TokenKind
      text: String
      line: u32
      column: u32
      file: String

  TokenKind:
    variants:
      - Identifier
      - Keyword
      - IntLiteral
      - FloatLiteral
      - CharLiteral
      - StringLiteral
      - Punctuator
      - Preprocessor
      - Whitespace
      - Comment
      - EndOfFile

  MacroDefinition:
    variants:
      ObjectLike:
        replacement: Vec<Token>
      FunctionLike:
        params: Vec<String>
        is_variadic: bool
        replacement: Vec<Token>

  PreprocessorError:
    variants:
      - FileNotFound(String)
      - IncludeError(String, String)
      - MacroError(String)
      - ConditionalError(String)
      - DbError(String)
      - IoError(std::io::Error)

api:
  Preprocessor:
    new: "fn new(db: OpticDb) -> Self"
    add_include_path: "fn add_include_path(&mut self, path: &str)"
    define_macro: "fn define_macro(&mut self, name: &str, value: &str)"
    process: "fn process(&mut self, file: &str) -> Result<Vec<Token>, PreprocessorError>"
    process_source: "fn process_source(&mut self, source: &str, file_name: &str) -> Result<Vec<Token>, PreprocessorError>"
    get_pragmas: "fn get_pragmas(&self) -> &[String]"
    get_warnings: "fn get_warnings(&self) -> &[String]"
    get_errors: "fn get_errors(&self) -> &[String]"

directives:
  - "#include <file> - system include with search paths"
  - '#include "file" - local include relative to current file'
  - "#define MACRO value - object-like macro"
  - "#define MACRO(args) body - function-like macro with ## and #"
  - "#undef MACRO - remove macro definition"
  - "#ifdef MACRO - conditional if macro is defined"
  - "#ifndef MACRO - conditional if macro is not defined"
  - "#if expr - conditional with integer constant expression"
  - "#elif expr - else-if conditional"
  - "#else - else branch"
  - "#endif - end conditional"
  - "#pragma text - store pragma for backend"
  - "#error msg - emit error diagnostic"
  - "#warning msg - emit warning diagnostic"
  - "#line - line directive"

predefined_macros:
  __STDC__: "1"
  __STDC_VERSION__: "201112L"
  __GNUC__: "4"
  __GNUC_MINOR__: "2"
  __LINE__: "expands to current line number"
  __FILE__: "expands to current file name (stringified)"

dependencies:
  - crate: sha2 (SHA-256 hashing)
  - module: src/db.rs (OpticDb for include deduplication)
