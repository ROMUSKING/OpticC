# Example of the lightweight prompt-spec format used in this repository
# Use this as a reference when updating notes inside jules_prompts/ or other checked-in docs

api_version: "1.0"
squad: "squad_a"
domain: "Graph Infrastructure"

structs:
  - name: "CAstNode"
    semantic_description: "The fundamental unit of the AST. Represents a single operation, declaration, or macro invocation."
    memory_layout: "Uses #[repr(C)] to ensure predictable layout in the mmap arena. Keep field names aligned with the real CAstNode definition in src/arena.rs."
    fields:
      - name: "kind"
        type: "u16"
        description: "The AST node type (e.g., 0x01 for ADD, 0x02 for VAR_DECL)."
      - name: "flags"
        type: "NodeFlags"
        description: "Bitflags representing properties like IS_CONST or IS_MACRO."
      - name: "first_child"
        type: "NodeOffset"
        description: "Pointer to the first child node in the arena."
      - name: "next_sibling"
        type: "NodeOffset"
        description: "Pointer to the next sibling node in the arena."
      - name: "data"
        type: "u32"
        description: "Inline payload or offset into interned data, depending on node kind."

functions:
  - name: "Arena::alloc"
    semantic_description: "Allocates a new CAstNode sequentially in the memory-mapped file."
    side_effects: "Advances the arena allocation cursor by one slot and writes directly into the mmap-backed storage."
    parameters:
      - name: "node"
        type: "CAstNode"
        description: "The node to allocate."
    returns:
      type: "NodeOffset"
      description: "The 32-bit offset representing the node's location in the arena."
    llm_usage_examples:
      - title: "Allocating a basic node"
        code: |
          let mut arena = Arena::new("ast.bin", 1024 * 1024).unwrap();
          let node = CAstNode {
              kind: 1,
              flags: NodeFlags::empty(),
              first_child: NodeOffset(0),
              next_sibling: NodeOffset(0),
              data: 0,
          };
          let offset = arena.alloc(node);
          // offset can now be safely passed to other nodes as a child/sibling pointer.
