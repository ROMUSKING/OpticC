api_version: "1.0"
structs:
  - name: NodeOffset
    fields:
      - name: "0"
        type: u32
  - name: CAstNode
    fields:
      - name: kind
        type: u16
      - name: flags
        type: NodeFlags
      - name: parent
        type: NodeOffset
      - name: first_child
        type: NodeOffset
      - name: next_sibling
        type: NodeOffset
      - name: data
        type: u32
  - name: NodeFlags
    description: "Bitflags representing node metadata"
  - name: Arena
functions:
  - name: Arena::new
    inputs:
      - name: path
        type: P (AsRef<Path>)
      - name: capacity
        type: u32
    returns: io::Result<Self>
  - name: Arena::alloc
    inputs:
      - name: self
        type: &mut Arena
      - name: node
        type: CAstNode
    returns: Option<NodeOffset>
  - name: Arena::get
    inputs:
      - name: self
        type: &Arena
      - name: offset
        type: NodeOffset
    returns: Option<&CAstNode>
  - name: Arena::get_mut
    inputs:
      - name: self
        type: &mut Arena
      - name: offset
        type: NodeOffset
    returns: Option<&mut CAstNode>